# OneDrive → GitHub 知识库自动同步
# 每周三 UTC 00:00 (北京时间 08:00) 运行
# 主子周末创作，周三在校时一次性同步所有更改
# 使用 MSAL 客户端凭证模式获取 Graph API Token

name: Sync from OneDrive

on:
  schedule:
    - cron: '0 0 * * 3'   # 每周三 08:00 CST
  workflow_dispatch:       # 也支持手动运行

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install msal requests

      - name: Sync from OneDrive
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_DRIVE_ID: ${{ secrets.AZURE_DRIVE_ID }}
          LOCAL_REPO_PATH: ${{ github.workspace }}
        run: python .github/scripts/sync_onedrive.py

      - name: Commit and push changes
        run: |
          git config user.name "暝烁 Bot"
          git config user.email "bot@knowledge-library.sync"
          git add -A
          git diff --cached --quiet || git commit -m "📚 自动同步 $(date '+%Y-%m-%d %H:%M')"
          git push
