# PC_Knowledges_Library — GitHub Pages 配置
title: 🧠 暝烁的知识库
description: 主子（孙梓豪）的个人知识库，记录学习与折腾
theme: jekyll-theme-cayman
lang: zh-CN

# 构建配置
markdown: kramdown
highlighter: rouge

# 不处理以下目录/文件
exclude:
  - .gitkeep
  - sync_status.json
  - LICENSE

# 默认布局
defaults:
  - scope:
      path: ""
    values:
      layout: default
      author: 暝烁
